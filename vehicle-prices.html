<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ODRP 車両価格一覧</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #fff;
      color: #222;
      line-height: 1.7;
    }
    main { padding: 22px; }
    .bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    input, select {
      padding: 11px 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      font-size: 15px;
    }
    input { flex: 1; min-width: 220px; }
    .wrap {
      overflow: auto;
      border: 1px solid #eee;
      border-radius: 14px;
      max-height: 760px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
      white-space: nowrap;
    }
    th {
      background: #fff5eb;
      position: sticky;
      top: 0;
      z-index: 1;
      color: #9a4300;
    }
    tbody tr:hover { background: #fffaf5; }
    td:nth-child(3) { font-weight: 700; color: #e66a00; }
    td:nth-child(4), td:nth-child(5) { font-weight: 700; }
    td:nth-child(6) {
      white-space: normal;
      min-width: 240px;
      max-width: 420px;
      color: #444;
    }
    .top-text {
      margin-bottom: 18px;
      padding: 16px 18px;
      border: 1px solid #ffd8b5;
      border-radius: 14px;
      background: #fff8f1;
      color: #7a3800;
      font-size: 16px;
    }
    .count { margin: 0 0 12px; color: #666; }
    @media (max-width: 700px) {
      main { padding: 12px; }
      .bar { display: grid; grid-template-columns: 1fr; }
      input { min-width: 0; width: 100%; }
      select { width: 100%; }
      th, td { padding: 9px 10px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="top-text">
      確認不足で積載記載があるのに、実際には積載できない車両もあります。ご了承ください。
    </div>

    <div class="bar">
      <input id="q" placeholder="車両名・カテゴリで検索">
      <select id="cat"><option value="">すべてのカテゴリ</option></select>
      <select id="sort">
        <option value="">標準順</option>
        <option value="a">価格が安い順</option>
        <option value="d">価格が高い順</option>
        <option value="la">積載量が少ない順</option>
        <option value="ld">積載量が多い順</option>
      </select>
    </div>

    <p class="count" id="cnt"></p>

    <div class="wrap">
      <table>
        <thead>
          <tr>
            <th>カテゴリ</th>
            <th>車両名</th>
            <th>金額</th>
            <th>積載量</th>
            <th>ダッシュボード</th>
            <th>説明</th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
      </table>
    </div>
  </main>

    const LOAD_BY_CATEGORY = {
      "商業": 2000, "バン": 800, "SUV": 150, "コンパクトカー": 150, "セダン": 100,
      "マッスルカー": 100, "オフロード": 200, "クーペ": 100,
      "クラシックスポーツカー": 100, "スポーツカー": 100, "スーパーカー": 100,
      "バイク": 0, "自転車": 0, "MOD車": 0, "ヘリコプター": 0
    };

    const LOAD_BY_VEHICLE = {
      "taco": 800, "タコスバン": 800,
      "pounder": 2000, "パウンダー": 2000,
      "benson": 2000, "ベンソン": 2000,
      "mule2": 2000, "mule3": 2000, "mule4": 2000, "mule": 2000, "ミュール": 2000,
      "italigto": 100,
      "packer": 0, "パッカー": 0,
      "phantom custom": 0, "phantom": 0, "ファントム・カスタム": 0, "ファントム": 0,
      "hauler": 0, "ホーラー": 0,
      "desert raid": 0, "デザートレイド": 0,
      "jester": 0, "ジェスター": 0,
      "flash gt": 0, "フラッシュgt": 0
    };

    const q = document.getElementById("q");
    const cat = document.getElementById("cat");
    const sort = document.getElementById("sort");
    const cnt = document.getElementById("cnt");
    const body = document.getElementById("body");

    function yen(n) { return "¥" + n.toLocaleString("ja-JP"); }

    function loadKg(r) {
      const catName = C[r[0]];
      const name = r[1].toLowerCase();
      for (const key in LOAD_BY_VEHICLE) {
        if (name.includes(key.toLowerCase())) return LOAD_BY_VEHICLE[key];
      }
      return LOAD_BY_CATEGORY[catName] || 0;
    }

    function loadText(r) {
      const kg = loadKg(r);
      return kg ? kg + "kg" : "-";
    }

    C.forEach(x => {
      const option = document.createElement("option");
      option.value = x;
      option.textContent = x;
      cat.appendChild(option);
    });

    function draw() {
      const k = q.value.trim().toLowerCase();
      const c = cat.value;
      const s = sort.value;

      let a = D.filter(r => {
        const categoryName = C[r[0]];
        const vehicleName = r[1];
        const description = r[3] || "";
        return (!c || categoryName === c) &&
          (categoryName + " " + vehicleName + " " + description).toLowerCase().includes(k);
      });

      if (s === "a") a.sort((x, y) => x[2] - y[2]);
      if (s === "d") a.sort((x, y) => y[2] - x[2]);
      if (s === "la") a.sort((x, y) => loadKg(x) - loadKg(y));
      if (s === "ld") a.sort((x, y) => loadKg(y) - loadKg(x));

      cnt.textContent = `表示 ${a.length} / ${D.length} 台`;
      body.innerHTML = a.map(r => `
        <tr>
          <td>${C[r[0]]}</td>
          <td>${r[1]}</td>
          <td>${yen(r[2])}</td>
          <td>${loadText(r)}</td>
          <td>50kg</td>
          <td>${r[3] || "-"}</td>
        </tr>
      `).join("");
    }

    q.addEventListener("input", draw);
    cat.addEventListener("change", draw);
    sort.addEventListener("change", draw);
    draw();
  </script>
