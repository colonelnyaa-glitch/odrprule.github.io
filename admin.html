<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>ODRP サイト管理画面</title>
  <link rel="stylesheet" href="admin.css">
  <script defer src="admin.js"></script>
</head>
<body>
  <header class="admin-header">
    <div>
      <p>ODRP WEBSITE EDITOR</p>
      <h1>サイト管理画面</h1>
    </div>
    <div class="header-actions">
      <button id="desktopBtn" class="active">PC</button>
      <button id="mobileBtn">スマホ</button>
      <a href="index.html" target="_blank" rel="noopener">公開ページ</a>
    </div>
  </header>

  <main class="admin-layout">
    <aside class="admin-panel">
      <section>
        <h2>編集方法</h2>
        <ol>
          <li>右のプレビュー内の文章・見出しをクリック</li>
          <li>そのまま文字を編集</li>
          <li>画像・リンクは要素をクリックして下の欄で変更</li>
          <li>最後に「index.htmlを書き出す」</li>
        </ol>
      </section>

      <section>
        <h2>選択中の要素</h2>
        <p id="selectedInfo" class="selected-info">まだ選択されていません</p>
        <label>リンクURL
          <input id="linkInput" type="text" placeholder="https://... または #support" disabled>
        </label>
        <label>画像URL / ファイルパス
          <input id="imageInput" type="text" placeholder="assets/example.png" disabled>
        </label>
        <label>画像説明（alt）
          <input id="altInput" type="text" placeholder="画像の説明" disabled>
        </label>
        <button id="applyElementBtn" disabled>選択要素へ反映</button>
      </section>

      <section>
        <h2>編集データ</h2>
        <div class="button-grid">
          <button id="saveDraftBtn">ブラウザに一時保存</button>
          <button id="loadDraftBtn">一時保存を復元</button>
          <button id="resetBtn" class="danger">変更をリセット</button>
        </div>
        <button id="downloadBtn" class="primary">index.htmlを書き出す</button>
        <p class="hint">書き出したファイルをGitHubの既存の <code>index.html</code> と入れ替えてください。</p>
      </section>

      <section>
        <h2>画像追加</h2>
        <label>画像ファイル
          <input id="uploadInput" type="file" accept="image/*">
        </label>
        <p class="hint">画像は自動でサイト内へ保存されません。先に <code>assets</code> フォルダへ画像を入れ、画像パスを指定する方法がおすすめです。</p>
      </section>

      <div id="message" class="message" aria-live="polite"></div>
    </aside>

    <section class="preview-shell" id="previewShell">
      <iframe id="siteFrame" src="index.html" title="ODRPサイト編集プレビュー"></iframe>
    </section>
  </main>
</body>
</html>
